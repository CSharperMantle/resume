name: Render

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v5
      - name: Render
        run: make dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pdf
      - uses: actions/deploy-pages@v4
        id: deployment
        
