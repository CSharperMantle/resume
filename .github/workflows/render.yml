name: Render

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v5
      - name: Install fonts
        run: sudo apt-get install fonts-noto-cjk fonts-noto-cjk-extra fonts-font-awesome
      - name: Render
        run: make dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
